name: Release macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  EXPECTED_MACOS_MAJOR: "26"
  EXPECTED_MACOS_VERSION: "26.5"
  EXPECTED_XCODE_VERSION: "26.0"
  EXPECTED_MACOS_SDK_VERSION: "26.0"

jobs:
  release-macos:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.EXPECTED_XCODE_VERSION }}

      - name: Show tool versions
        run: |
          set -euo pipefail

          ACTUAL_MACOS_VERSION="$(sw_vers -productVersion)"
          ACTUAL_XCODE_VERSION="$(xcodebuild -version | sed -n '1s/^Xcode //p')"
          ACTUAL_MACOS_SDK_VERSION="$(xcrun --sdk macosx --show-sdk-version)"

          echo "Runner macOS version: ${ACTUAL_MACOS_VERSION}"
          xcodebuild -version
          echo "macOS SDK: ${ACTUAL_MACOS_SDK_VERSION}"
          rustc --version
          cargo --version
          gh --version

          case "${ACTUAL_XCODE_VERSION}" in
            "${EXPECTED_XCODE_VERSION}"|"${EXPECTED_XCODE_VERSION}".*) ;;
            *)
              echo "error: expected Xcode ${EXPECTED_XCODE_VERSION}.x, got ${ACTUAL_XCODE_VERSION}" >&2
              exit 1
              ;;
          esac

          case "${ACTUAL_MACOS_SDK_VERSION}" in
            "${EXPECTED_MACOS_SDK_VERSION}"|"${EXPECTED_MACOS_SDK_VERSION}".*) ;;
            *)
              echo "error: expected macOS SDK ${EXPECTED_MACOS_SDK_VERSION}.x, got ${ACTUAL_MACOS_SDK_VERSION}" >&2
              exit 1
              ;;
          esac

          case "${ACTUAL_MACOS_VERSION}" in
            ${EXPECTED_MACOS_MAJOR}.*) ;;
            *)
              echo "error: expected macOS ${EXPECTED_MACOS_MAJOR}.x runner, got ${ACTUAL_MACOS_VERSION}" >&2
              exit 1
              ;;
          esac

          if [ "${ACTUAL_MACOS_VERSION}" != "${EXPECTED_MACOS_VERSION}" ]; then
            echo "warning: runner macOS is ${ACTUAL_MACOS_VERSION}, local machine is ${EXPECTED_MACOS_VERSION}" >&2
            echo "warning: GitHub-hosted runners may not expose the exact same macOS patch version as local." >&2
          fi

      - name: Build app and publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          set -euo pipefail

          PROJECT_PATH="AIGateway/AIGateway.xcodeproj"
          SCHEME="AIGateway"
          CONFIGURATION="Release"
          APP_NAME="AIGateway.app"
          ZIP_NAME="AIGateway.app.zip"
          REPO="${GITHUB_REPOSITORY}"
          BUILD_ROOT="$(mktemp -d /tmp/ai-gateway-release.XXXXXX)"
          EXPORT_ROOT="${BUILD_ROOT}/export"
          ASSET_PATH="${EXPORT_ROOT}/${ZIP_NAME}"

          cleanup() {
            rm -rf "${BUILD_ROOT}"
          }

          trap cleanup EXIT

          mkdir -p "${EXPORT_ROOT}"

          BUILD_SETTINGS="$(xcodebuild -project "${PROJECT_PATH}" -scheme "${SCHEME}" -configuration "${CONFIGURATION}" -showBuildSettings)"
          MARKETING_VERSION="$(printf '%s\n' "${BUILD_SETTINGS}" | sed -n 's/^[[:space:]]*MARKETING_VERSION = //p' | head -n 1)"
          CURRENT_PROJECT_VERSION="$(printf '%s\n' "${BUILD_SETTINGS}" | sed -n 's/^[[:space:]]*CURRENT_PROJECT_VERSION = //p' | head -n 1)"

          if [ -z "${MARKETING_VERSION}" ] || [ -z "${CURRENT_PROJECT_VERSION}" ]; then
            echo "error: failed to read version information from Xcode build settings" >&2
            exit 1
          fi

          TAG="${RELEASE_TAG:-v${MARKETING_VERSION}}"

          echo "Preparing release ${TAG}"
          echo "Version: ${MARKETING_VERSION} (${CURRENT_PROJECT_VERSION})"
          echo "Building ${APP_NAME}"
          echo "Code signing disabled for this release build"

          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -derivedDataPath "${BUILD_ROOT}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

          APP_PATH="$(find "${BUILD_ROOT}/DerivedData/Build/Products/${CONFIGURATION}" -maxdepth 1 -type d -name "${APP_NAME}" | head -n 1)"

          if [ -z "${APP_PATH}" ] || [ ! -d "${APP_PATH}" ]; then
            echo "error: built app not found" >&2
            exit 1
          fi

          echo "Packaging ${ZIP_NAME}"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ASSET_PATH}"

          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "error: release ${TAG} already exists on ${REPO}" >&2
            exit 1
          fi

          echo "Creating GitHub release ${TAG}"
          gh release create "${TAG}" "${ASSET_PATH}" \
            --repo "${REPO}" \
            --title "${TAG}" \
            --generate-notes
